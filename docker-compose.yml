services:
  db:
    image: postgres:16-alpine
    container_name: vaultbot-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: vaultbot_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: vaultbot-api
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:password123@db:5432/vaultbot_db?schema=public
      - NODE_ENV=development
      - LOG_LEVEL=debug
    depends_on:
      - db
    volumes:
      - ./apps/api:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  postgres_data:
